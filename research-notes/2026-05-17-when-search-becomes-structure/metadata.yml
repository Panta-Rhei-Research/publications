summary: >
  This Research Note reads Stephen Wolfram's ruliological exploration of P vs
  NP as an external comparator for a narrower Panta Rhei question: when does
  witness search become finite address construction? It does not claim to solve
  orthodox P vs NP, identify the Ruliad with Category tau, or treat Wolfram's
  finite experiments as validation of Panta Rhei.
claim_boundary:
  core: >
    Under finite interface width and a reconstruction discipline, some
    tau-admissible witness problems can be treated as address construction
    rather than blind witness search.
  non_claims:
    - It does not solve orthodox P vs NP.
    - It does not claim P = NP over unrestricted Turing machines.
    - It does not claim that the Ruliad is Category tau.
    - It does not claim Wolfram validates Panta Rhei.
    - It does not claim every NP witness space is tau-admissible.
    - It does not export tau-P_adm = tau-NP_adm without a separate bridge theorem.
