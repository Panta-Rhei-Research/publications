name: Publication Integrity

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check generated manifests and catalogs
        run: python3 scripts/build_manifests.py --check

      - name: Verify publication artifacts
        run: python3 scripts/verify_publications.py

      - name: Check whitespace
        run: git diff --check
