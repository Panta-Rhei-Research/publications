name: Broken link
description: Report a broken canonical URL, DOI, route, or artifact link.
title: "[Broken link]: "
labels: ["broken-link"]
body:
  - type: input
    id: url
    attributes:
      label: Broken URL
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Where did you find it?
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: What happened?
    validations:
      required: true
