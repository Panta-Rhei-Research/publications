summary: >
  This research note uses thirty familiar open questions from quantum
  foundations, particle physics, gravity, black-hole physics, and cosmology as
  an external expressiveness stress test for the tau-framework. It does not
  claim to solve the questions. It maps each problem surface to a structural
  answer-shape and identifies recurring construction patterns and validation
  seams.
claim_boundary:
  core: >
    The note tests whether the existing tau-construction grammar produces
    coherent, differentiated answer-shapes across an externally chosen open
    problem tableau.
  non_claims:
    - It does not claim to solve the thirty open questions.
    - It does not present the prompt tableau as a scientific authority.
    - It does not claim external validation of the tau-framework.
    - It does not collapse answer-shapes into validated answers.
