name: Publication Integrity

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check generated manifests and catalogs
        run: python3 scripts/build_manifests.py --check

      - name: Verify publication artifacts
        run: python3 scripts/verify_publications.py

      - name: Validate manifest contract
        run: python3 scripts/validate_manifest.py

      - name: Check catalog outputs
        run: python3 scripts/build_catalog.py --check

      - name: Check route report
        run: python3 scripts/generate_route_report.py --check

      - name: Check publication links
        run: python3 scripts/check_links.py --offline-short-routes

      - name: Validate Corpus metadata projection
        run: python3 scripts/validate_corpus_metadata_projection.py

      - name: Check whitespace
        run: git diff --check
