name: Publication correction
description: Report a concrete correction for a released publication artifact.
title: "[Correction]: "
labels: ["accepted-correction"]
body:
  - type: input
    id: artifact_id
    attributes:
      label: Artifact ID
      description: Publication ID or folder name.
    validations:
      required: true
  - type: input
    id: artifact_title
    attributes:
      label: Artifact title
    validations:
      required: true
  - type: dropdown
    id: issue_type
    attributes:
      label: Issue type
      options:
        - typo
        - broken_link
        - metadata_error
        - citation_error
        - erratum_needed
        - claim_boundary_issue
        - prior_art
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or source
    validations:
      required: true
