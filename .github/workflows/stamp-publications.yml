name: Stamp Publications

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "research-papers/**/*.pdf"
      - "research-notes/**/*.pdf"
      - "research-briefings/**/*.pdf"

permissions:
  contents: write

jobs:
  stamp:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OpenTimestamps client
        run: python3 -m pip install opentimestamps-client

      - name: Create missing timestamp receipts
        run: python3 scripts/stamp_publications.py

      - name: Verify generated state
        run: python3 scripts/verify_publications.py

      - name: Commit generated receipts and manifests
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add research-papers research-notes research-briefings catalog
            git commit -m "Stamp publication PDFs"
            git push
          fi

